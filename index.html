<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Modern & CAD — Color & Border Reference</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

:root {
  --bg:#07080a;
  --grid:#0e1014;
  --panel:#111318;
  --surface:#181b22;
  --border:#232730;
  --border2:#2d3240;
  --text:#dde2f0;
  --muted:#505870;
  --accent:#00e5ff;
  --accent2:#ff3d6b;
  --accent3:#7fff6e;
  --gold:#ffc93c;
}

html { scroll-behavior: smooth; }

body {
  background: var(--bg);
  background-image:
    linear-gradient(var(--grid) 1px, transparent 1px),
    linear-gradient(90deg, var(--grid) 1px, transparent 1px);
  background-size: 32px 32px;
  color: var(--text);
  font-family: 'JetBrains Mono', monospace;
  min-height: 100vh;
  padding: 0 0 80px;
}

/* ── HEADER ── */
header {
  padding: 48px 40px 32px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: flex-end;
  gap: 32px;
  flex-wrap: wrap;
  background: linear-gradient(180deg, rgba(0,229,255,0.04) 0%, transparent 100%);
  position: relative;
  overflow: hidden;
}

header::before {
  content:'';
  position: absolute;
  top: -60px; right: -60px;
  width: 260px; height: 260px;
  border-radius: 50%;
  background: radial-gradient(circle, rgba(0,229,255,0.08) 0%, transparent 70%);
  pointer-events: none;
}

.logo-block h1 {
  font-family: 'Syne', sans-serif;
  font-weight: 800;
  font-size: clamp(1.8rem, 4vw, 2.8rem);
  letter-spacing: -0.04em;
  line-height: 1;
}

.logo-block h1 span { color: var(--accent); }
.logo-block h1 em { color: var(--accent2); font-style: normal; }

.logo-block p {
  font-size: 0.68rem;
  letter-spacing: 0.22em;
  text-transform: uppercase;
  color: var(--muted);
  margin-top: 6px;
}

.search-wrap {
  margin-left: auto;
  display: flex;
  align-items: center;
  gap: 8px;
}

.search-input {
  background: var(--panel);
  border: 1px solid var(--border2);
  color: var(--text);
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.72rem;
  padding: 9px 14px;
  border-radius: 4px;
  width: 240px;
  outline: none;
  transition: border-color 0.2s;
}
.search-input:focus { border-color: var(--accent); }
.search-input::placeholder { color: var(--muted); }

/* ── TABS ── */
.tabs {
  display: flex;
  padding: 0 40px;
  border-bottom: 1px solid var(--border);
  gap: 0;
  position: sticky;
  top: 0;
  background: rgba(7,8,10,0.95);
  backdrop-filter: blur(10px);
  z-index: 50;
}

.tab {
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.7rem;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  padding: 14px 22px;
  background: none;
  border: none;
  border-bottom: 2px solid transparent;
  color: var(--muted);
  cursor: pointer;
  transition: color 0.2s, border-color 0.2s;
  position: relative;
  bottom: -1px;
}
.tab:hover { color: var(--text); }
.tab.active { color: var(--accent); border-bottom-color: var(--accent); }
.tab.t2.active { color: var(--accent2); border-bottom-color: var(--accent2); }
.tab.t3.active { color: var(--accent3); border-bottom-color: var(--accent3); }
.tab.t4.active { color: var(--gold); border-bottom-color: var(--gold); }

/* ── SECTIONS ── */
.section { display: none; padding: 36px 40px; }
.section.active { display: block; }

/* ── GROUP HEADING ── */
.group-heading {
  display: flex;
  align-items: center;
  gap: 12px;
  margin-bottom: 16px;
  margin-top: 32px;
}
.group-heading:first-child { margin-top: 0; }

.group-heading span {
  font-family: 'Syne', sans-serif;
  font-size: 0.7rem;
  font-weight: 700;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: var(--muted);
}

.group-heading::after {
  content: '';
  flex: 1;
  height: 1px;
  background: var(--border);
}

/* ── COLOR SWATCHES ── */
.swatches {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(116px, 1fr));
  gap: 6px;
  margin-bottom: 8px;
}

.swatch {
  border: 1px solid var(--border);
  border-radius: 3px;
  overflow: hidden;
  cursor: pointer;
  transition: transform 0.12s, border-color 0.12s, box-shadow 0.12s;
  background: var(--panel);
}
.swatch:hover {
  transform: translateY(-3px) scale(1.01);
  border-color: var(--border2);
  box-shadow: 0 8px 24px rgba(0,0,0,0.6);
}

.swatch-chip {
  width: 100%;
  height: 52px;
  position: relative;
}

.swatch-chip::after {
  content: attr(data-hex);
  position: absolute;
  inset: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 0.58rem;
  opacity: 0;
  transition: opacity 0.15s;
  font-family: 'JetBrains Mono', monospace;
  letter-spacing: 0.05em;
}

.swatch:hover .swatch-chip::after { opacity: 1; }

.swatch-meta {
  padding: 6px 8px;
}
.swatch-name {
  font-size: 0.62rem;
  color: var(--text);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  margin-bottom: 1px;
}
.swatch-hex {
  font-size: 0.58rem;
  color: var(--muted);
}

/* ── BORDER CARDS ── */
.border-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
  gap: 10px;
}

.border-card {
  background: var(--panel);
  border: 1px solid var(--border);
  border-radius: 4px;
  padding: 16px;
  cursor: pointer;
  transition: border-color 0.15s, transform 0.12s;
  display: flex;
  flex-direction: column;
  gap: 10px;
}
.border-card:hover {
  border-color: var(--border2);
  transform: translateY(-2px);
}

.border-preview {
  height: 56px;
  background: var(--surface);
  border-radius: 3px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 0.6rem;
  color: var(--muted);
  letter-spacing: 0.1em;
}

.border-name {
  font-family: 'Syne', sans-serif;
  font-size: 0.72rem;
  font-weight: 700;
  color: var(--text);
}

.border-code {
  font-size: 0.6rem;
  color: var(--muted);
  background: var(--bg);
  padding: 7px 9px;
  border-radius: 3px;
  word-break: break-all;
  line-height: 1.6;
  border: 1px solid var(--border);
}

/* tag */
.tag {
  display: inline-block;
  font-size: 0.55rem;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  padding: 2px 7px;
  border-radius: 2px;
  border: 1px solid;
  margin-bottom: 8px;
}
.tag-modern { color: var(--accent);  border-color: rgba(0,229,255,0.3); background: rgba(0,229,255,0.07); }
.tag-cad    { color: var(--accent2); border-color: rgba(255,61,107,0.3); background: rgba(255,61,107,0.07); }
.tag-both   { color: var(--accent3); border-color: rgba(127,255,110,0.3); background: rgba(127,255,110,0.07); }

/* ── TOAST ── */
#toast {
  position: fixed;
  bottom: 28px;
  left: 50%;
  transform: translateX(-50%) translateY(16px);
  background: var(--accent);
  color: #000;
  font-size: 0.7rem;
  font-weight: 500;
  padding: 9px 20px;
  border-radius: 2px;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.18s, transform 0.18s;
  z-index: 999;
  letter-spacing: 0.04em;
  max-width: 360px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
#toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
</style>
</head>

  {n:"Title Block",   tag:"cad", code:"border: 2px solid #aaa; border-top: 4px solid #fff;",
   style:{border:"2px solid #aaa",borderTop:"4px solid #ddd"}},
  {n:"Callout Box",   tag:"cad", code:"border: 2px solid #00ddff; border-radius: 0; outline: 1px solid #005577; outline-offset: 3px;",
   style:{border:"2px solid #00ddff",outline:"1px solid #005577",outlineOffset:"3px"}},
  {n:"Weld Symbol",   tag:"cad", code:"border-bottom: 3px solid #ffd60a; box-shadow: 0 2px 0 #c8a800;",
   style:{borderBottom:"3px solid #ffd60a",boxShadow:"0 2px 0 #c8a800"}},
  {n:"Approved Stamp",tag:"cad", code:"border: 3px double #00bb44; border-radius: 4px; box-shadow: 0 0 0 2px rgba(0,187,68,0.2);",
   style:{border:"3px double #00bb44",borderRadius:"4px",boxShadow:"0 0 0 2px rgba(0,187,68,0.2)"}},
  {n:"Hold / Issue",  tag:"cad", code:"border: 2px solid #0066ff; border-radius: 50%; aspect-ratio: 1;",
   style:{border:"2px solid #0066ff",borderRadius:"50%"}},
  {n:"Section Cut",   tag:"cad", code:"border-left: 4px solid #ff0000; border-right: 4px solid #ff0000; border-top: none; border-bottom: none;",
   style:{borderLeft:"4px solid #ff0000",borderRight:"4px solid #ff0000"}},
];

/* ═══════════════════════════════════
   RENDER
═══════════════════════════════════ */

function renderColorGroups(id, groups) {
  const container = document.getElementById(id);
  container.innerHTML = "";
  let any = false;
  for (const [group, colors] of Object.entries(groups)) {
    if (!colors.length) continue;
    any = true;
    const wrap = document.createElement("div");
    wrap.innerHTML = `<div class="group-heading"><span>${group}</span></div>`;
    const grid = document.createElement("div");
    grid.className = "swatches";
    colors.forEach(c => {
      const el = document.createElement("div");
      el.className = "swatch";
      const textColor = luminance(c.h) > 0.35 ? "#000" : "#fff";
      el.innerHTML = `
        <div class="swatch-chip" style="background:${c.h}" data-hex="${c.h}"></div>
        <div class="swatch-meta">
          <div class="swatch-name">${c.n}</div>
          <div class="swatch-hex">${c.h}</div>
        </div>`;
      el.querySelector(".swatch-chip").style.setProperty("--chip-txt", textColor);
      el.querySelector(".swatch-chip").style.color = textColor;
      el.onclick = () => copy(c.h);
      grid.appendChild(el);
    });
    wrap.appendChild(grid);
    container.appendChild(wrap);
  }
  if (!any) container.innerHTML = `<p style="color:var(--muted);font-size:0.75rem;margin-top:20px">No results found.</p>`;
}

function renderBorderGrid(id, borders) {
  const container = document.getElementById(id);
  container.innerHTML = "";
  borders.forEach(b => {
    const card = document.createElement("div");
    card.className = "border-card";
    const styleStr = Object.entries(b.style).map(([k,v])=>`${camel2kebab(k)}:${v}`).join(";");
    const tagClass = b.tag === "modern" ? "tag-modern" : b.tag === "cad" ? "tag-cad" : "tag-both";
    const tagLabel = b.tag === "modern" ? "Modern" : b.tag === "cad" ? "CAD" : "Both";
    card.innerHTML = `
      <div class="border-preview" style="${styleStr}">Preview</div>
      <div>
        <span class="tag ${tagClass}">${tagLabel}</span>
        <div class="border-name">${b.n}</div>
      </div>
      <div class="border-code">${b.code}</div>`;
    card.onclick = () => copy(b.code);
    container.appendChild(card);
  });
}

function camel2kebab(s){ return s.replace(/([A-Z])/g,'-$1').toLowerCase(); }

function luminance(hex){
  const r=parseInt(hex.slice(1,3),16)/255;
  const g=parseInt(hex.slice(3,5),16)/255;
  const b=parseInt(hex.slice(5,7),16)/255;
  const toL=c=>c<=0.03928?c/12.92:Math.pow((c+0.055)/1.055,2.4);
  return 0.2126*toL(r)+0.7152*toL(g)+0.0722*toL(b);
}

/* search */
let currentTab = "modern-colors";

function onSearch(){
  const q = document.getElementById("searchInput").value.toLowerCase().trim();
  if(currentTab === "modern-colors"){
    const f = filterGroups(MODERN_COLORS, q);
    renderColorGroups("modernColorGroups", f);
  } else if(currentTab === "cad-colors"){
    const f = filterGroups(CAD_COLORS, q);
    renderColorGroups("cadColorGroups", f);
  }
}

function filterGroups(groups, q){
  if(!q) return groups;
  const out = {};
  for(const [g, arr] of Object.entries(groups)){
    const m = arr.filter(c=>c.n.toLowerCase().includes(q)||c.h.toLowerCase().includes(q));
    if(m.length) out[g]=m;
  }
  return out;
}

function showTab(id, el){
  document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));
  document.querySelectorAll(".section").forEach(s=>s.classList.remove("active"));
  el.classList.add("active");
  document.getElementById(id).classList.add("active");
  currentTab = id;
  document.getElementById("searchInput").value = "";
  // re-render if needed
  if(id==="modern-colors") renderColorGroups("modernColorGroups", MODERN_COLORS);
  if(id==="cad-colors") renderColorGroups("cadColorGroups", CAD_COLORS);
}

/* toast */
function copy(text){
  navigator.clipboard.writeText(text).catch(()=>{});
  const t = document.getElementById("toast");
  const short = text.length > 55 ? text.slice(0,55)+"…" : text;
  t.textContent = `✓ Copied: ${short}`;
  t.classList.add("show");
  clearTimeout(copy._timer);
  copy._timer = setTimeout(()=>t.classList.remove("show"), 2000);
}

/* init */
renderColorGroups("modernColorGroups", MODERN_COLORS);
renderColorGroups("cadColorGroups", CAD_COLORS);
renderBorderGrid("modernBorderGrid", MODERN_BORDERS);
renderBorderGrid("cadBorderGrid", CAD_BORDERS);
</script>
