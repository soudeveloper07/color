<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Modern & CAD — Color & Border Reference</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

:root{
  --bg:#07080a;
  --grid-c:#0d0f13;
  --panel:#111318;
  --surface:#181b22;
  --border:#232730;
  --border2:#2d3240;
  --text:#dde2f0;
  --muted:#4a5068;
  --cyan:#00e5ff;
  --pink:#ff3d6b;
  --green:#7fff6e;
  --gold:#ffc93c;
  --hdr:56px;
}

/* ── SCROLLBAR ── */
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:var(--bg)}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}

/* ── ANIMATIONS ── */
@keyframes fadeUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
@keyframes scanline{0%{top:-100%}100%{top:200%}}
@keyframes pulse{0%,100%{opacity:.6}50%{opacity:1}}
@keyframes shimmer{0%{background-position:-200% center}100%{background-position:200% center}}
@keyframes borderSpin{0%{--a:0deg}100%{--a:360deg}}
@keyframes ripple{0%{transform:scale(0);opacity:.6}100%{transform:scale(3);opacity:0}}
@keyframes tagPop{0%{transform:scale(.8);opacity:0}60%{transform:scale(1.1)}100%{transform:scale(1);opacity:1}}
@keyframes glowPulse{0%,100%{box-shadow:0 0 8px rgba(0,229,255,.2)}50%{box-shadow:0 0 22px rgba(0,229,255,.55)}}

html{scroll-behavior:smooth}

body{
  background:var(--bg);
  color:var(--text);
  font-family:'JetBrains Mono',monospace;
  min-height:100vh;
  overflow-x:hidden;
  position:relative;
}

/* background grid */
body::before{
  content:'';
  position:fixed;inset:0;
  background-image:
    linear-gradient(var(--grid-c) 1px,transparent 1px),
    linear-gradient(90deg,var(--grid-c) 1px,transparent 1px);
  background-size:28px 28px;
  pointer-events:none;
  z-index:0;
}

/* scanline effect */
body::after{
  content:'';
  position:fixed;left:0;right:0;
  height:2px;
  background:linear-gradient(transparent,rgba(0,229,255,.04),transparent);
  animation:scanline 7s linear infinite;
  pointer-events:none;
  z-index:1;
}

/* ── HEADER ── */
header{
  position:sticky;top:0;z-index:100;
  background:rgba(7,8,10,.94);
  backdrop-filter:blur(16px);
  -webkit-backdrop-filter:blur(16px);
  border-bottom:1px solid var(--border);
  padding:0 clamp(12px,4vw,40px);
  display:flex;align-items:center;
  height:var(--hdr);
  gap:12px;
  overflow:hidden;
}

header::after{
  content:'';
  position:absolute;bottom:0;left:0;right:0;
  height:1px;
  background:linear-gradient(90deg,transparent,rgba(0,229,255,.5),transparent);
  animation:shimmer 3s linear infinite;
  background-size:200% 100%;
}

.logo{
  font-family:'Syne',sans-serif;
  font-weight:800;
  font-size:clamp(.9rem,2.5vw,1.3rem);
  letter-spacing:-.04em;
  white-space:nowrap;
  animation:fadeUp .5s ease both;
}
.logo .c{color:var(--cyan)}
.logo .p{color:var(--pink)}

.logo-dot{
  width:7px;height:7px;
  border-radius:50%;
  background:var(--cyan);
  box-shadow:0 0 8px var(--cyan);
  animation:pulse 2s ease infinite;
  flex-shrink:0;
}

/* search */
.search-wrap{
  margin-left:auto;
  position:relative;
  animation:fadeUp .5s .1s ease both;
}
.search-wrap svg{
  position:absolute;left:10px;top:50%;transform:translateY(-50%);
  width:13px;height:13px;stroke:var(--muted);pointer-events:none;
}
.search-input{
  background:var(--panel);
  border:1px solid var(--border);
  color:var(--text);
  font-family:'JetBrains Mono',monospace;
  font-size:.68rem;
  padding:7px 12px 7px 30px;
  border-radius:4px;
  width:clamp(120px,30vw,220px);
  outline:none;
  transition:border-color .2s,box-shadow .2s;
}
.search-input:focus{
  border-color:var(--cyan);
  box-shadow:0 0 0 2px rgba(0,229,255,.12);
}
.search-input::placeholder{color:var(--muted)}

/* hamburger (mobile) */
.ham{
  display:none;
  flex-direction:column;gap:5px;
  background:none;border:none;cursor:pointer;
  padding:6px;margin-left:8px;
  flex-shrink:0;
}
.ham span{
  display:block;width:20px;height:2px;
  background:var(--text);
  border-radius:1px;
  transition:transform .25s, opacity .2s;
}
.ham.open span:nth-child(1){transform:translateY(7px) rotate(45deg)}
.ham.open span:nth-child(2){opacity:0}
.ham.open span:nth-child(3){transform:translateY(-7px) rotate(-45deg)}

/* ── TABS ── */
.tabs{
  display:flex;
  padding:0 clamp(12px,4vw,40px);
  border-bottom:1px solid var(--border);
  background:rgba(7,8,10,.9);
  backdrop-filter:blur(8px);
  position:sticky;
  top:var(--hdr);
  z-index:90;
  overflow-x:auto;
  scrollbar-width:none;
  gap:0;
  animation:fadeUp .5s .15s ease both;
}
.tabs::-webkit-scrollbar{display:none}

.tab{
  font-family:'JetBrains Mono',monospace;
  font-size:.63rem;
  letter-spacing:.12em;
  text-transform:uppercase;
  padding:12px 16px;
  background:none;border:none;
  border-bottom:2px solid transparent;
  color:var(--muted);
  cursor:pointer;
  white-space:nowrap;
  position:relative;bottom:-1px;
  transition:color .2s,border-color .2s;
}
.tab:hover{color:var(--text)}
.tab.t1.active{color:var(--cyan);border-bottom-color:var(--cyan)}
.tab.t2.active{color:var(--pink);border-bottom-color:var(--pink)}
.tab.t3.active{color:var(--green);border-bottom-color:var(--green)}
.tab.t4.active{color:var(--gold);border-bottom-color:var(--gold)}

/* ── SECTIONS ── */
.section{display:none;padding:clamp(16px,4vw,36px) clamp(12px,4vw,40px) 60px}
.section.active{display:block}

/* ── GROUP HEADING ── */
.group-heading{
  display:flex;align-items:center;gap:10px;
  margin:28px 0 12px;
}
.group-heading:first-child{margin-top:0}
.group-heading span{
  font-family:'Syne',sans-serif;
  font-size:.62rem;font-weight:700;
  letter-spacing:.22em;text-transform:uppercase;
  color:var(--muted);white-space:nowrap;
}
.group-heading::after{content:'';flex:1;height:1px;background:var(--border)}

/* ── SWATCHES ── */
.swatches{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(100px,1fr));
  gap:6px;margin-bottom:4px;
}

.swatch{
  border:1px solid var(--border);
  border-radius:4px;overflow:hidden;
  cursor:pointer;
  background:var(--panel);
  animation:fadeUp .4s ease both;
  position:relative;
  transition:transform .15s,border-color .15s,box-shadow .15s;
}
.swatch:hover{
  transform:translateY(-4px) scale(1.02);
  border-color:var(--border2);
  box-shadow:0 10px 28px rgba(0,0,0,.65);
  z-index:2;
}

/* ripple on click */
.swatch-ripple{
  position:absolute;
  border-radius:50%;
  width:40px;height:40px;
  margin-left:-20px;margin-top:-20px;
  background:rgba(255,255,255,.25);
  pointer-events:none;
  animation:ripple .5s ease-out forwards;
}

.swatch-chip{
  width:100%;height:48px;
  position:relative;
  display:flex;align-items:center;justify-content:center;
  font-size:.58rem;letter-spacing:.05em;
  transition:opacity .15s;
}

.chip-copy{
  position:absolute;inset:0;
  display:flex;align-items:center;justify-content:center;
  font-size:.6rem;opacity:0;
  transition:opacity .2s;
  background:rgba(0,0,0,.3);
  backdrop-filter:blur(2px);
}
.swatch:hover .chip-copy{opacity:1}

.swatch-meta{padding:6px 8px}
.swatch-name{
  font-size:.6rem;color:var(--text);
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
  margin-bottom:1px;
}
.swatch-hex{font-size:.56rem;color:var(--muted)}

/* ── BORDER GRID ── */
.border-grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(220px,1fr));
  gap:10px;
}

.border-card{
  background:var(--panel);
  border:1px solid var(--border);
  border-radius:4px;
  padding:14px;
  cursor:pointer;
  animation:fadeUp .4s ease both;
  display:flex;flex-direction:column;gap:10px;
  position:relative;overflow:hidden;
  transition:border-color .2s,transform .15s,box-shadow .15s;
}
.border-card::before{
  content:'';
  position:absolute;top:0;left:-100%;width:60%;height:100%;
  background:linear-gradient(90deg,transparent,rgba(255,255,255,.03),transparent);
  transition:left .4s ease;
}
.border-card:hover::before{left:150%}
.border-card:hover{
  border-color:var(--border2);
  transform:translateY(-3px);
  box-shadow:0 12px 32px rgba(0,0,0,.6);
}

.border-preview{
  height:54px;
  background:var(--surface);
  border-radius:3px;
  display:flex;align-items:center;justify-content:center;
  font-size:.58rem;color:var(--muted);
  letter-spacing:.1em;
  transition:background .2s;
}
.border-card:hover .border-preview{background:rgba(255,255,255,.03)}

.border-name{
  font-family:'Syne',sans-serif;
  font-size:.7rem;font-weight:700;
  color:var(--text);
}

.border-code{
  font-size:.58rem;color:var(--muted);
  background:var(--bg);
  padding:7px 9px;border-radius:3px;
  word-break:break-all;line-height:1.65;
  border:1px solid var(--border);
}

/* tag */
.tag{
  display:inline-block;
  font-size:.52rem;letter-spacing:.14em;text-transform:uppercase;
  padding:2px 7px;border-radius:2px;border:1px solid;
  margin-bottom:6px;
  animation:tagPop .3s ease both;
}
.tag-modern{color:var(--cyan);border-color:rgba(0,229,255,.3);background:rgba(0,229,255,.07)}
.tag-cad{color:var(--pink);border-color:rgba(255,61,107,.3);background:rgba(255,61,107,.07)}
.tag-both{color:var(--green);border-color:rgba(127,255,110,.3);background:rgba(127,255,110,.07)}

/* ── MOBILE DRAWER TABS ── */
@media(max-width:600px){
  .ham{display:flex}
  .tabs{
    position:fixed;
    top:var(--hdr);left:0;right:0;
    flex-direction:column;
    border:none;border-bottom:1px solid var(--border);
    background:rgba(7,8,10,.97);
    max-height:0;overflow:hidden;
    transition:max-height .3s ease;
    padding:0 16px;
    z-index:95;
  }
  .tabs.open{max-height:260px;padding:8px 16px 12px}
  .tab{border-bottom:none;border-left:2px solid transparent;text-align:left;padding:10px 14px}
  .tab.t1.active{border-left-color:var(--cyan);border-bottom:none}
  .tab.t2.active{border-left-color:var(--pink);border-bottom:none}
  .tab.t3.active{border-left-color:var(--green);border-bottom:none}
  .tab.t4.active{border-left-color:var(--gold);border-bottom:none}
  .swatches{grid-template-columns:repeat(auto-fill,minmax(85px,1fr))}
  .border-grid{grid-template-columns:1fr}
}

@media(min-width:601px) and (max-width:900px){
  .swatches{grid-template-columns:repeat(auto-fill,minmax(95px,1fr))}
  .border-grid{grid-template-columns:repeat(auto-fill,minmax(200px,1fr))}
}

/* ── TOAST ── */
#toast{
  position:fixed;bottom:24px;left:50%;
  transform:translateX(-50%) translateY(20px);
  background:var(--cyan);color:#000;
  font-size:.68rem;font-weight:500;
  padding:8px 18px;border-radius:3px;
  opacity:0;pointer-events:none;
  transition:opacity .18s,transform .18s;
  z-index:999;
  max-width:90vw;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* ── NO RESULTS ── */
.no-result{
  color:var(--muted);font-size:.72rem;
  margin-top:24px;text-align:center;
  letter-spacing:.06em;
}

/* stagger swatches */
.swatch:nth-child(1){animation-delay:.03s}
.swatch:nth-child(2){animation-delay:.06s}
.swatch:nth-child(3){animation-delay:.09s}
.swatch:nth-child(4){animation-delay:.12s}
.swatch:nth-child(5){animation-delay:.15s}
.swatch:nth-child(6){animation-delay:.18s}
.swatch:nth-child(7){animation-delay:.21s}
.swatch:nth-child(8){animation-delay:.24s}
.swatch:nth-child(n+9){animation-delay:.27s}

.border-card:nth-child(1){animation-delay:.04s}
.border-card:nth-child(2){animation-delay:.08s}
.border-card:nth-child(3){animation-delay:.12s}
.border-card:nth-child(4){animation-delay:.16s}
.border-card:nth-child(5){animation-delay:.20s}
.border-card:nth-child(6){animation-delay:.24s}
.border-card:nth-child(n+7){animation-delay:.28s}
</style>
</head>

/* ═══════════ RENDER ═══════════ */
function lum(hex){
  const r=parseInt(hex.slice(1,3),16)/255,g=parseInt(hex.slice(3,5),16)/255,b=parseInt(hex.slice(5,7),16)/255;
  const l=c=>c<=.04?c/12.92:((c+.055)/1.055)**2.4;
  return .2126*l(r)+.7152*l(g)+.0722*l(b);
}
function k2c(s){return s.replace(/([A-Z])/g,'-$1').toLowerCase()}

function buildSwatches(colors){
  return colors.map((c,i)=>{
    const tc=lum(c.h)>.35?'#000':'#fff';
    return `<div class="swatch" style="animation-delay:${Math.min(i*.04,.3)}s" onclick="copyAndRipple(event,this,'${c.h}')">
      <div class="swatch-chip" style="background:${c.h}">
        <div class="chip-copy" style="color:${tc}">COPY</div>
      </div>
      <div class="swatch-meta">
        <div class="swatch-name">${c.n}</div>
        <div class="swatch-hex">${c.h}</div>
      </div>
    </div>`;
  }).join('');
}

function renderGroups(containerId, groups){
  const el=document.getElementById(containerId);
  el.innerHTML='';
  let any=false;
  for(const [g,arr] of Object.entries(groups)){
    if(!arr.length)continue;
    any=true;
    el.insertAdjacentHTML('beforeend',
      `<div class="group-heading"><span>${g}</span></div>
       <div class="swatches">${buildSwatches(arr)}</div>`);
  }
  if(!any)el.innerHTML='<p class="no-result">No results found.</p>';
}

function renderBorders(containerId, borders){
  const el=document.getElementById(containerId);
  el.innerHTML='';
  borders.forEach((b,i)=>{
    const styleStr=Object.entries(b.s).map(([k,v])=>`${k2c(k)}:${v}`).join(';');
    const tclass=b.tag==='modern'?'tag-modern':b.tag==='cad'?'tag-cad':'tag-both';
    const tlabel=b.tag==='modern'?'Modern':b.tag==='cad'?'CAD':'Both';
    el.insertAdjacentHTML('beforeend',
      `<div class="border-card" style="animation-delay:${Math.min(i*.05,.35)}s" onclick="copy('${b.code.replace(/'/g,"\\'")}')">
        <div class="border-preview" style="${styleStr}">PREVIEW</div>
        <div><span class="tag ${tclass}">${tlabel}</span><div class="border-name">${b.n}</div></div>
        <div class="border-code">${b.code}</div>
      </div>`);
  });
}

/* ═══════════ INTERACTIONS ═══════════ */
function copyAndRipple(e, el, text){
  // ripple
  const rect=el.getBoundingClientRect();
  const rip=document.createElement('div');
  rip.className='swatch-ripple';
  rip.style.left=(e.clientX-rect.left)+'px';
  rip.style.top=(e.clientY-rect.top)+'px';
  el.appendChild(rip);
  setTimeout(()=>rip.remove(),600);
  copy(text);
}

let toastTimer;
function copy(text){
  navigator.clipboard.writeText(text).catch(()=>{});
  const t=document.getElementById('toast');
  const short=text.length>50?text.slice(0,50)+'…':text;
  t.textContent='✓  '+short;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer=setTimeout(()=>t.classList.remove('show'),2000);
}

let currentTab='modern-colors';

function showTab(id, el){
  // close mobile menu
  document.getElementById('tabNav').classList.remove('open');
  document.getElementById('ham').classList.remove('open');
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
  el.classList.add('active');
  document.getElementById(id).classList.add('active');
  currentTab=id;
  document.getElementById('searchInput').value='';
  // re-render to reset animation
  if(id==='modern-colors')renderGroups('mcg',MC);
  if(id==='cad-colors')renderGroups('ccg',CC);
}

function toggleMobileMenu(){
  const nav=document.getElementById('tabNav');
  const ham=document.getElementById('ham');
  nav.classList.toggle('open');
  ham.classList.toggle('open');
}

function onSearch(){
  const q=document.getElementById('searchInput').value.toLowerCase().trim();
  if(currentTab==='modern-colors'){
    renderGroups('mcg', filterG(MC,q));
  } else if(currentTab==='cad-colors'){
    renderGroups('ccg', filterG(CC,q));
  }
}

function filterG(groups, q){
  if(!q)return groups;
  const out={};
  for(const [g,arr] of Object.entries(groups)){
    const m=arr.filter(c=>c.n.toLowerCase().includes(q)||c.h.toLowerCase().includes(q));
    if(m.length)out[g]=m;
  }
  return out;
}

/* ═══════════ INIT ═══════════ */

renderGroups('ccg',CC);
renderBorders('mbg',MB);
renderBorders('cbg',CB);
